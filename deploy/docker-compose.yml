services:
  caddy:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      ALATUBE_ADDR: ":8080"
      ALATUBE_WORK_DIR: "/srv/alatube/jobs"
      ALATUBE_MEDIA_IMAGE: "alatube-media-runner:local"
      ALATUBE_JOB_TIMEOUT: "5m"
      ALATUBE_MEDIA_MEMORY: "512m"
      ALATUBE_MEDIA_CPUS: "1.0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/alatube/jobs:/srv/alatube/jobs
    user: "0:0"
    tmpfs:
      - /tmp:size=1g,noexec,nosuid
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  media-runner:
    build:
      context: ./media-runner
    image: alatube-media-runner:local
    command: ["true"]
    profiles: ["build-only"]

networks:
  default:
    name: alatube_default
  alatube_media:
    name: alatube_media
